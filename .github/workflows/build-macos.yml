name: Build macOS Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Zip .app bundle
        run: |
          set -euo pipefail
          APP_PATH="$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -maxdepth 1 -name '*.app' | head -n1)"
          if [ -z "${APP_PATH}" ]; then
            echo "No .app found for target ${{ matrix.target }}"
            exit 1
          fi
          APP_NAME="$(basename "${APP_PATH}" .app)"
          ZIP_NAME="${APP_NAME}-${{ matrix.target }}.zip"
          ditto -c -k --keepParent "${APP_PATH}" "${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WASPrFlow-${{ matrix.target }}
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error

  release:
    name: Publish Tag Assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: WASPrFlow-aarch64-apple-darwin
          path: dist

      - name: Download intel artifact
        uses: actions/download-artifact@v4
        with:
          name: WASPrFlow-x86_64-apple-darwin
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
