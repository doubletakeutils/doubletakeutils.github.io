<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Download DoubleTake</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #162033;
      --muted: #50607a;
      --brand: #1f88e5;
      --brand-strong: #1168b6;
      --line: #dbe3ee;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(160deg, #eef3f9 0%, #f8fbff 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      max-width: 760px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(17, 40, 78, 0.08);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 28px;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.45;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-weight: 600;
    }
    .btn-primary {
      background: var(--brand);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--brand-strong);
    }
    .btn-secondary {
      border: 1px solid var(--line);
      color: var(--text);
      background: #f8fbff;
    }
    code, pre {
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      background: #f3f7fc;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    code {
      padding: 2px 6px;
    }
    pre {
      margin: 10px 0 0;
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Download DoubleTake</h1>
    <p>This installer is delivered from GitHub Releases using a small bootstrap script and verified chunk downloads.</p>
    <p>Set <code>REPO</code> and <code>TAG</code> below before publishing this page.</p>

    <div class="actions">
      <a id="bootstrap-link" class="btn btn-primary" href="#">Download Bootstrap Script</a>
      <a id="release-link" class="btn btn-secondary" href="#" target="_blank" rel="noopener">Open GitHub Release</a>
    </div>

    <p>One-command install (PowerShell):</p>
    <pre id="cmd"></pre>
  </main>

  <script>
    const REPO = "doubletake/DoubleTake-Images";
    const TAG = "v1.2.116";

    const bootstrapUrl = `https://github.com/${REPO}/releases/download/${TAG}/DoubleTakeSetup-bootstrap.ps1`;
    const releaseUrl = `https://github.com/${REPO}/releases/tag/${TAG}`;
    const command = `powershell -ExecutionPolicy Bypass -Command "iwr ${bootstrapUrl} -OutFile DoubleTakeSetup-bootstrap.ps1; .\\DoubleTakeSetup-bootstrap.ps1 -Repo ${REPO} -Tag ${TAG}"`;

    document.getElementById("bootstrap-link").href = bootstrapUrl;
    document.getElementById("release-link").href = releaseUrl;
    document.getElementById("cmd").textContent = command;
  </script>
</body>
</html>
